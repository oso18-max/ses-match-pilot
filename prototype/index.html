<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SES Auto Send</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="50" height="40" viewBox="0 0 50 40" fill="none">
            <path d="M7 10h9c13 0 13 10 27 10" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
            <path d="M7 30h9c13 0 13-10 27-10" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
            <path d="M36 13l7 7-7 7" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="7" cy="10" r="4" fill="#0f172a"/>
            <circle cx="7" cy="30" r="4" fill="#0f172a"/>
          </svg>
        </div>
        <div>
          <strong>SES Auto Send</strong>
        </div>
      </div>
      <nav class="nav-list" aria-label="メインナビゲーション">
        <button class="nav-item is-active" data-view="overview">マッチング管理</button>
        <button class="nav-item" data-view="inbox">案件メール</button>
        <button class="nav-item" data-view="matches">マッチング</button>
        <button class="nav-item" data-view="sheets">登録スキルシート</button>
        <button class="nav-item" data-view="customers">送信先マスタ</button>
        <button class="nav-item" data-view="send">個別送信</button>
        <button class="nav-item" data-view="history">送信履歴</button>
        <button class="nav-item" data-view="replies">返信検知</button>
        <button class="nav-item" data-view="interviews">面談管理</button>
        <button class="nav-item" data-view="deals">成約管理</button>
        <button class="nav-item" data-view="test">テスト</button>
        <button class="nav-item" data-view="settings">設定</button>
      </nav>
      <div class="safety-box">
        <strong>送信前チェック</strong>
        <span>NG条件を除外</span>
        <span>1社ずつ個別送信</span>
        <span>履歴を保存</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="viewTitle">全体像</h1>
        </div>
        <div class="top-actions">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="案件・人材・会社・メール">
          </label>
          <button id="settingsBtn" class="primary-action">設定</button>
        </div>
      </header>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
